name: Deploy Playground to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: |
          npm run build
          npm run build:playground
          # Create a redirect index.html at the root
          echo '<!DOCTYPE html><html><head><meta http-equiv="refresh" content="0; url=https://github.com/celsowm/pdf-to-markdown-js"><script>window.location.href="https://github.com/celsowm/pdf-to-markdown-js"</script></head><body>Redirecting to <a href="https://github.com/celsowm/pdf-to-markdown-js">GitHub</a>...</body></html>' > ./playground/dist/index.html

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './playground/dist'

  deploy:
    environment:
      name: github-pages
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
